<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>tuiga</title>
		<link rel="stylesheet" href="../css/style-calculator.css" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	</head>
	<body>
		<div class="counter" id="counter0">0</div>
		<div class="calculator">
			<p class="text">Калькулятор</p>
			<div class="box">
				<input type="number" class="tuiga1" id="input1" />
				<input type="number" class="tuiga1" id="input2" />
			</div>

			<div class="one">
				<button class="lox plus" id="plus">+</button>
				<button class="lox minus" id="minus">-</button>
				<button class="lox divide" id="divide">/</button>
				<button class="lox multiply" id="multiply">*</button>
			</div>
			<button class="two" id="submit">Вычислить</button>

			<div class="result">
				<div class="result1">Результат</div>
				<div class="result2" id="result">0</div>
			</div>
		</div>

		<script src="/js/jsCalculator.js"></script>
	</body>
</html>
